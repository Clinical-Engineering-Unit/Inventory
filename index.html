<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<meta http-equiv="X-Frame-Options" content="DENY"/>
<title>MedEquip Inventory Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Nunito',sans-serif;background:#8faab5;min-height:100vh;display:flex;justify-content:flex-start;overscroll-behavior:none}
:root{
  --teal:#1a8fa0;--teal-dk:#14717f;--teal-lt:#e6f6f8;--teal-mid:#c0e8ef;
  --green:#22c55e;--green-lt:#dcfce7;--green-dk:#16a34a;
  --red:#ef4444;--red-lt:#fee2e2;
  --amber:#f59e0b;--amber-lt:#fef3c7;
  --blue:#3b82f6;--blue-lt:#dbeafe;
  --orange:#f97316;
  --bg:#f0f4f6;--card:#ffffff;--text:#1e293b;--sub:#64748b;--border:#e2e8f0;
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
/* Mobile shell */
#app{width:100%;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}
/* Desktop: two-column layout with sidebar */
@media(min-width:900px){
  body{background:#dde8ed;flex-direction:row;align-items:flex-start;min-height:100vh}
  #app{flex-direction:row;max-width:1280px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.18);border-radius:0;min-height:100vh}
  #sidebar{width:240px;flex-shrink:0;background:var(--teal-dk);min-height:100vh;display:flex;flex-direction:column;padding:28px 0 20px;position:sticky;top:0;height:100vh;overflow-y:auto}
  #main-content{flex:1;min-width:0;min-height:100vh;position:relative;overflow-x:hidden}
  .bnav{display:none!important}
  .screen{padding-bottom:24px!important}
  .page-hero{padding:32px 32px 28px}
  .page-hero h1{font-size:28px}
  div[style*="padding:16px;display:flex;flex-direction:column"]{padding:24px 32px!important}
  div[style*="padding:16px;display:flex;flex-direction:column;gap:14px"]{padding:24px 32px!important}
  div[style*="padding:16px;display:flex;flex-direction:column;gap:16px"]{padding:24px 32px!important}
  div[style*="padding:16px;display:flex;flex-direction:column;gap:12px"]{padding:24px 32px!important}
  div[style*="padding:16px"]{padding:24px 32px!important}
  .fullscreen{position:fixed;left:240px;right:0;transform:none;max-width:none;width:auto}
  .overlay{left:240px}
  .mbox{max-width:520px;align-self:flex-end;border-radius:20px 20px 0 0}
  #offline-bar{left:240px;transform:none;max-width:none}
  .tile{padding:22px 18px 26px}
}
@media(min-width:1100px){
  #sidebar{width:260px}
  .fullscreen{left:260px}
  .overlay{left:260px}
}
/* Tablet */
@media(min-width:600px) and (max-width:899px){
  body{background:#dde8ed;justify-content:center}
  #app{max-width:600px;border-radius:0;box-shadow:0 0 40px rgba(0,0,0,.2)}
  #sidebar{display:none}
  .page-hero h1{font-size:26px}
}
/* Mobile */
@media(max-width:599px){
  #sidebar{display:none}
  #app{max-width:430px}
}
.screen{flex:1;overflow-y:auto;padding-bottom:88px;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(0,0,0,.07);max-width:430px;left:50%;transform:translateX(-50%)}
@media(min-width:600px) and (max-width:899px){.bnav{max-width:600px}}
.nbtn{flex:1;background:none;border:none;padding:10px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;user-select:none;position:relative}
.nbtn .ico{font-size:19px;line-height:1;filter:grayscale(1) opacity(.35);transition:filter .15s}
.nbtn .lbl{font-size:9.5px;font-weight:700;letter-spacing:.3px;color:var(--sub);font-family:'Nunito',sans-serif}
.nbtn.active .ico{filter:none}
.nbtn.active .lbl{color:var(--teal)}
.nbtn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--teal);border-radius:0 0 4px 4px}

/* ── Cards ── */
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow)}
.tile{background:var(--card);border-radius:16px;padding:18px 14px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:transform .12s;-webkit-user-select:none}
.tile:active{transform:scale(.96)}
.tile-bar{position:absolute;bottom:0;left:0;right:0;height:5px}
.eq-card{background:var(--card);border-radius:14px;padding:15px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--border);transition:transform .12s}
.eq-card:active{transform:scale(.975)}

/* ── Status label row ── */
.status-label{font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;border-radius:99px;padding:4px 10px;white-space:nowrap;line-height:1.4;letter-spacing:.2px}

/* ── Buttons ── */
.btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;border-radius:12px;border:none;cursor:pointer;padding:12px 14px;transition:opacity .15s,transform .1s;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;user-select:none}
.btn:active{opacity:.82;transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#fff}
.btn-outline{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal-mid)}
.btn-red{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#fff}

/* ── Inputs ── */
.inp{font-family:'Nunito',sans-serif;font-size:14px;padding:11px 13px;border-radius:11px;border:1.5px solid var(--border);outline:none;width:100%;color:var(--text);background:#fff;transition:border .15s,box-shadow .15s;-webkit-appearance:none}
.inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,143,160,.12)}
.inp.err{border-color:var(--red)}
input[type=date].inp{color-scheme:light}
.field-err{font-size:11px;color:var(--red);display:none;margin-top:3px;font-weight:600}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .15s ease;backdrop-filter:blur(3px)}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:96vh;overflow-y:auto;padding:22px 18px 36px;display:flex;flex-direction:column;gap:13px;animation:slideUp .22s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(44px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Full-screen slide ── */
.fullscreen{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;max-width:430px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;animation:slideRight .22s ease both}
@media(min-width:600px) and (max-width:899px){.fullscreen{max-width:600px}}
@keyframes slideRight{from{opacity:0;transform:translateX(calc(50% + 24px))}to{opacity:1;transform:translateX(-50%)}}
.fs-header{background:var(--card);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:10}
.fs-back{background:var(--teal-lt);border:none;cursor:pointer;color:var(--teal);font-family:'Nunito',sans-serif;padding:7px 12px;border-radius:10px;font-weight:700;font-size:14px}

/* ── Page hero ── */
.page-hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dk) 100%);padding:26px 20px 22px;color:#fff}
.page-hero h1{font-size:24px;font-weight:900;color:#fff;line-height:1.1}
.page-hero p{font-size:11px;font-weight:700;letter-spacing:1.5px;opacity:.8;text-transform:uppercase;margin-top:4px}

/* ── Misc ── */
.sec-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase}
.ro-notice{background:#f8fafc;border:1.5px dashed var(--border);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--sub);font-weight:600}
.mcard-red{background:#fff5f5;border:1.5px solid var(--red);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.mcard-amb{background:#fffbeb;border:1.5px solid var(--amber);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.mcard-grn{background:var(--green-lt);border:1.5px solid var(--green);border-radius:14px;padding:16px;text-align:center;color:var(--green-dk);font-weight:700;font-size:14px}
.toggle{width:46px;height:26px;border-radius:13px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:10px;background:#fff;transition:left .2s;box-shadow:0 1px 5px rgba(0,0,0,.22)}
.info-row{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;z-index:1;pointer-events:none}
.search-wrap input{padding-left:36px}
.report-row{padding:14px 16px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s}
.report-row:active{transform:scale(.975)}
#offline-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#f97316;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:6px;z-index:200;display:none}
@media(min-width:600px) and (max-width:899px){#offline-bar{max-width:600px}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div id="offline-bar">⚠️ OFFLINE</div>
<div id="app"></div>
<script>
"use strict";
/* ═══════════════════════════════════════════════════════
   1. SECURITY & STORAGE UTILITIES
═══════════════════════════════════════════════════════ */
function esc(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;").replace(/\//g,"&#x2F;");
}
const san={
  text:  s=>String(s==null?"":s).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,"").replace(/<[^>]*>/g,"").trim().slice(0,200),
  name:  s=>String(s==null?"":s).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,"").replace(/<[^>]*>/g,"").trim().slice(0,120),
  serial:s=>String(s==null?"":s).replace(/[^A-Za-z0-9 \-_./]/g,"").trim().slice(0,60),
  notes: s=>String(s==null?"":s).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,"").replace(/<[^>]*>/g,"").trim().slice(0,500),
  date:  s=>{const m=(/^(\d{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01]))/).exec(String(s==null?"":s).trim());return m?m[1]:"";},
  email: s=>String(s==null?"":s).toLowerCase().replace(/[^a-z0-9@._+\-]/g,"").slice(0,120),
  num:   s=>{const n=parseInt(String(s==null?"":s));return isNaN(n)?0:n;},
};
const V={
  name:      v=>v.trim().length>=2&&v.trim().length<=120,
  serial:    v=>/^[A-Za-z0-9 \-_./]{1,60}$/.test(v.trim()),
  email:     v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()),
  date:      v=>/^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/.test(v),
  status:    v=>["functional_in_use","functional_not_in_use","non_functional","needs_repair","obsolete"].includes(v),
  calStatus: v=>["cal_required","cal_not_required"].includes(v),
};
const _lr={n:0,t:0};
function checkRate(){const now=Date.now();if(now>_lr.t){_lr.n=0;_lr.t=now+60000;}return ++_lr.n<=5;}

// Storage — loadP/saveP use localStorage (persistent), loadS/saveS use sessionStorage (auth)
function loadP(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function saveP(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function loadS(k,fb){try{const v=sessionStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function saveS(k,v){try{sessionStorage.setItem(k,JSON.stringify(v));}catch{}}

/* ═══════════════════════════════════════════════════════
   2. CONFIGURATION — replace with your Supabase values
═══════════════════════════════════════════════════════ */
const SUPABASE_URL  = "https://lgblqdapsvrogwzsjpif.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnYmxxZGFwc3Zyb2d3enNqcGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTAxNjgsImV4cCI6MjA5NTI2NjE2OH0.JBf14-QxnEQ0XnlbuW1_VLCzhf5XkjcO_HUejWDMQ0E";

/* ═══════════════════════════════════════════════════════
   3. SUPABASE CLIENT
═══════════════════════════════════════════════════════ */
const sb=(()=>{
  function hdr(x={}){
    const tok=STATE?.adminSession?.access_token||SUPABASE_ANON;
    return{"Content-Type":"application/json","apikey":SUPABASE_ANON,"Authorization":"Bearer "+tok,...x};
  }
  async function req(url,o={}){
    const c=new AbortController(),t=setTimeout(()=>c.abort(),12000);
    try{
      const r=await fetch(url,{...o,signal:c.signal});
      clearTimeout(t);
      if(!r.ok&&r.status!==204){const tx=await r.text();throw new Error("HTTP "+r.status+": "+tx.slice(0,200));}
      return r.status===204?null:r.json();
    }catch(e){clearTimeout(t);throw e;}
  }
  return{
    query:(t,p="")=>req(SUPABASE_URL+"/rest/v1/"+t+"?"+p,{headers:hdr({Prefer:"return=representation"})}),
    insert:(t,b)=>req(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:hdr({Prefer:"return=representation"}),body:JSON.stringify(b)}),
    safeUpdate:(t,id,b,knownDate)=>req(SUPABASE_URL+"/rest/v1/"+t+"?id=eq."+encodeURIComponent(id)+"&last_updated=eq."+encodeURIComponent(knownDate),{method:"PATCH",headers:hdr({Prefer:"return=representation"}),body:JSON.stringify(b)}),
    remove:(t,id)=>req(SUPABASE_URL+"/rest/v1/"+t+"?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:hdr()}),
    bulkInsert:(t,rows)=>req(SUPABASE_URL+"/rest/v1/"+t,{method:"POST",headers:hdr({Prefer:"return=representation,resolution=ignore-duplicates"}),body:JSON.stringify(rows)}),
    signIn:(email,pw)=>req(SUPABASE_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON},body:JSON.stringify({email,password:pw})}),
    signOut:(tok)=>req(SUPABASE_URL+"/auth/v1/logout",{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON,"Authorization":"Bearer "+tok}}),
    // Settings table: key-value store synced across all devices
    getSettings:()=>req(SUPABASE_URL+"/rest/v1/settings?select=key,value",{headers:hdr()}),
    setSetting:(key,value)=>req(SUPABASE_URL+"/rest/v1/settings",{
      method:"POST",
      headers:hdr({Prefer:"return=representation,resolution=merge-duplicates"}),
      body:JSON.stringify({key,value:JSON.stringify(value)}),
    }),
  };
})();

/* ═══════════════════════════════════════════════════════
   4. CONSTANTS
═══════════════════════════════════════════════════════ */
// ── Functional Status — exactly 5 options ──────────────────────────────────

};

const CHART_PAL=["#1a8fa0","#22c55e","#ef4444","#f59e0b","#3b82f6","#a855f7","#f97316","#14b8a6","#ec4899","#84cc16"];

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
const SEED=[
  {id:"1", name:"Weighing Scale",     category:"Vital Signs",         serial_number:"20345",      location:"OPD",           status:"functional_not_in_use",calibration_status:"cal_required",    last_calibration:"2025-10-10",next_calibration:"2026-10-10",next_maintenance:"2026-06-10",notes:"",                     last_updated:"2026-04-07"},

  {id:"4", name:"Defibrillator",      category:"Life Support",        serial_number:"DF-4421",    location:"Emergency Room",status:"functional_in_use",    calibration_status:"cal_required",    last_calibration:"2025-04-15",next_calibration:"2026-04-15",next_maintenance:"2026-07-15",notes:"",                     last_updated:"2026-04-06"},

  {id:"6", name:"Pulse Oximeter",     category:"Vital Signs",         serial_number:"PO-7821",    location:"Ward A",        status:"functional_in_use",    calibration_status:"cal_not_required",last_calibration:null,        next_calibration:null,        next_maintenance:"2026-07-01",notes:"",                     last_updated:"2026-04-04"},
  {id:"7", name:"Ventilator",         category:"Life Support",        serial_number:"VN-2019-3",  location:"ICU",           status:"needs_repair",         calibration_status:"cal_required",    last_calibration:"2025-06-14",next_calibration:"2026-06-14",next_maintenance:"2026-06-14",notes:"Fan bearing worn",     last_updated:"2026-04-03"},

const today   =()=>new Date().toISOString().slice(0,10);
const uid     =()=>(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now().toString(36));
const daysDiff=d=>{if(!d)return 9999;try{return Math.ceil((new Date(d)-new Date(today()))/86400000);}catch{return 9999;}};
const fmtDate =d=>{try{return d?new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";}catch{return d||"—";}};
const isAdmin =()=>!!STATE.adminSession?.access_token;

// Calibration status helpers — purely date-driven
const isCalOverdue  =e=>e.calibration_status==="cal_required"&&!!e.next_calibration&&daysDiff(e.next_calibration)<0;
const isCalUpcoming =e=>e.calibration_status==="cal_required"&&!!e.next_calibration&&(()=>{const d=daysDiff(e.next_calibration);return d>=0&&d<=30;})();

// Stats
function getStats(){
  const eq=STATE.equipment;
  return{
    total:      eq.length,
    functional: eq.filter(e=>["functional_in_use","functional_not_in_use"].includes(e.status)).length,
    overdue:    eq.filter(e=>daysDiff(e.next_maintenance)<0).length,
    calOverdue: eq.filter(isCalOverdue).length,
    needsRepair:eq.filter(e=>e.status==="needs_repair").length,
    obsolete:   eq.filter(e=>e.status==="obsolete").length,
    overdueList:eq.filter(e=>daysDiff(e.next_maintenance)<0),
    upcoming:   eq.filter(e=>{const d=daysDiff(e.next_maintenance);return d>=0&&d<=30;}),
    calOverdueList: eq.filter(isCalOverdue),
    calUpcomingList:eq.filter(isCalUpcoming),
  };
}

// Functional status badge HTML
function funcBadge(status){
  const s=STATUS_CFG[status]||{label:status,bg:"#94a3b8",text:"#fff",icon:"?"};
  return '<span class="badge" style="background:'+s.bg+';color:'+s.text+'">'+s.icon+' '+esc(s.label)+'</span>';
}
// Calibration status badge HTML (state-aware — shows overdue/upcoming/required/not-required)
function calBadge(e){
  if(!e||e.calibration_status!=="cal_required"){
    return '<span class="badge" style="background:#f1f5f9;color:#94a3b8;font-size:10px;border:1px solid #e2e8f0">— Not Required</span>';
  }
  if(isCalOverdue(e)){
    const d=Math.abs(daysDiff(e.next_calibration));
    return '<span class="badge" style="background:#b45309;color:#fff;font-size:10px">⏰ Cal Overdue '+d+'d</span>';
  }
  if(isCalUpcoming(e)){
    const d=daysDiff(e.next_calibration);
    return '<span class="badge" style="background:#d97706;color:#fff;font-size:10px">🔧 Cal Due in '+d+'d</span>';
  }
  return '<span class="badge" style="background:#f59e0b;color:#fff;font-size:10px">🔧 Cal Required</span>';
}

async function fetchEquipment(){
  if(STATE.offline){STATE.equipment=JSON.parse(JSON.stringify(SEED));STATE.loading=false;STATE.lastFetch=Date.now();render();return;}
  try{
    const data=await sb.query("equipment","order=last_updated.desc&limit=500");
    if(Array.isArray(data)){STATE.equipment=data;}else throw new Error("Bad response");
  }catch(e){
    console.warn("Supabase fetch failed, using seed:",e.message);
    STATE.equipment=JSON.parse(JSON.stringify(SEED));STATE.offline=true;
  }
  STATE.loading=false;STATE.lastFetch=Date.now();render();
}

async function persistEquipment(item){
  if(STATE.offline){
    const idx=STATE.equipment.findIndex(e=>e.id===item.id);
    idx>=0?(STATE.equipment[idx]=item):STATE.equipment.unshift(item);return item;
  }
  try{
    if(item._isNew){const i={...item};delete i._isNew;const r=await sb.insert("equipment",i);return Array.isArray(r)?r[0]:r;}
    const current=STATE.equipment.find(e=>e.id===item.id);
    const knownDate=current?.last_updated||today();
    const r=await sb.safeUpdate("equipment",item.id,item,knownDate);
    if(Array.isArray(r)&&r.length===0){showToast("⚠️ Record changed by another user — refreshing…","error");await fetchEquipment();throw new Error("Conflict");}
    return Array.isArray(r)?r[0]:r;
  }catch(e){if(e.message!=="Conflict")showToast("Save failed: "+e.message,"error");throw e;}
}

async function removeEquipment(id){
  if(!STATE.offline)try{await sb.remove("equipment",id);}catch(e){showToast("Delete failed: "+e.message,"error");throw e;}
  STATE.equipment=STATE.equipment.filter(e=>e.id!==id);
}

async function bulkPersist(rows){
  if(STATE.offline){
    rows.forEach(r=>{if(!STATE.equipment.find(e=>e.serial_number.toLowerCase()===r.serial_number.toLowerCase()))STATE.equipment.unshift(r);});
    return{inserted:rows.length,skipped:0};
  }
  try{
    const r=await sb.bulkInsert("equipment",rows);
    const inserted=Array.isArray(r)?r.length:0;
    return{inserted,skipped:rows.length-inserted};
  }catch(e){showToast("Bulk save failed: "+e.message,"error");throw e;}
}

/* ═══════════════════════════════════════════════════════
   9. REAL-TIME POLLING (multi-user concurrency)
═══════════════════════════════════════════════════════ */
function startPolling(){
  if(STATE.pollTimer)return;
  STATE.pollTimer=setInterval(async()=>{
    if(STATE.offline||STATE.loading||STATE.modal||STATE.detail)return;
    try{
      const since=STATE.lastFetch?new Date(STATE.lastFetch).toISOString().slice(0,10):new Date(0).toISOString().slice(0,10);
      const r=await sb.query("equipment","last_updated=gte."+encodeURIComponent(since)+"&select=id");
      if(Array.isArray(r)&&r.length>0){await fetchEquipment();showToast("🔄 Equipment updated by another user","info");}
      // Also re-sync settings (catches hospital name / list changes from other devices)
      const prevName=STATE.settings.hospitalName;
      await loadSettingsFromDB();
      if(STATE.settings.hospitalName!==prevName){render();} // re-render if changed
    }catch{}
  },30000);
}

async function doLogin(email,pw){
  if(!checkRate())return{ok:false,msg:"Too many attempts. Wait 1 minute."};
  const e2=san.email(email);
  if(!V.email(e2))return{ok:false,msg:"Enter a valid email address."};
  if(!pw||pw.length<6||pw.length>200)return{ok:false,msg:"Password must be 6–200 characters."};
  if(STATE.offline){
    const sess={access_token:"demo_"+uid(),user:{email:e2}};
    STATE.adminSession=sess;STATE.adminEmail=e2;saveS("medinv_admin",sess);return{ok:true};
  }
  try{
    const r=await sb.signIn(e2,pw);
    if(r?.access_token){STATE.adminSession=r;STATE.adminEmail=r.user?.email||e2;saveS("medinv_admin",r);return{ok:true};}
    return{ok:false,msg:r?.error_description||r?.message||"Invalid credentials."};
  }catch(e){return{ok:false,msg:"Login error: "+e.message};}
}
async function doLogout(){

/* ═══════════════════════════════════════════════════════
   10b. SETTINGS SYNC (Supabase ↔ all devices)
   Settings are stored in a Supabase 'settings' table
   so changes on one device appear on all others.
   localStorage is used as an offline fallback only.
═══════════════════════════════════════════════════════ */
async function loadSettingsFromDB(){
  if(STATE.offline)return; // use localStorage fallback
  try{
    const rows=await sb.getSettings();
    if(!Array.isArray(rows))return;
    const map={};
    rows.forEach(r=>{try{map[r.key]=JSON.parse(r.value);}catch{map[r.key]=r.value;}});
    // Merge into STATE.settings (Supabase wins over localStorage)
    if(map.hospitalName)   STATE.settings.hospitalName=map.hospitalName;
    if(map.reminders!==undefined) STATE.settings.reminders=map.reminders;
    if(map.calThreshold)   STATE.settings.calThreshold=map.calThreshold;
    if(map.categories&&Array.isArray(map.categories)) STATE.settings.categories=map.categories;
    if(map.locations&&Array.isArray(map.locations))   STATE.settings.locations=map.locations;
    // Write merged result to localStorage as cache
    saveP("medinv_settings",STATE.settings);
  }catch(e){console.warn("Settings load failed:",e.message);}
}

async function saveSettingToDB(key,value){
  // Always write to localStorage first (instant, offline-safe)
  STATE.settings[key]=value;
  saveP("medinv_settings",STATE.settings);
  // Then sync to Supabase (admin only — enforced by RLS)
  if(!STATE.offline){
    try{await sb.setSetting(key,value);}
    catch(e){console.warn("Setting sync failed:",e.message);}
  }
}

function parseBulkFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"yyyy-mm-dd"});
      if(!raw||raw.length<2){showToast("File is empty or unreadable","error");return;}
      let headerIdx=0;
      for(let i=0;i<Math.min(5,raw.length);i++){if(String(raw[i][0]||"").toLowerCase().trim()==="name"){headerIdx=i;break;}}
      const dataRows=raw.slice(headerIdx+1);
      const cats=getCategories().map(c=>c.toLowerCase());
      const locs=getLocations().map(l=>l.toLowerCase());
      const valid=[],errors=[];
      dataRows.forEach((row,ri)=>{
        if(!row||row.every(c=>!String(c||"").trim()))return;
        const rn=headerIdx+ri+2;
        const nm=san.name(String(row[0]||""));
        const cat=san.text(String(row[1]||""));
        const ser=san.serial(String(row[2]||""));
        const loc=san.text(String(row[3]||""));
        const st=san.text(String(row[4]||"")).toLowerCase().replace(/ /g,"_");
        const nm2=san.date(String(row[5]||""));
        const cs=san.text(String(row[6]||"")).toLowerCase().replace(/ /g,"_");
        const lc=san.date(String(row[7]||""));
        const nc=san.date(String(row[8]||""));
        const notes=san.notes(String(row[9]||""));
        const errs=[];
        if(!V.name(nm))errs.push("name: 2–120 chars required");
        if(!cats.includes(cat.toLowerCase()))errs.push("category: '"+cat+"' not in list");
        if(!V.serial(ser))errs.push("serial_number: invalid (max 60 alphanumeric)");
        if(valid.find(v=>v.serial_number.toLowerCase()===ser.toLowerCase()))errs.push("serial_number: duplicate in this file");
        if(STATE.equipment.find(eq=>eq.serial_number.toLowerCase()===ser.toLowerCase()))errs.push("serial_number: '"+ser+"' already exists");
        if(!locs.includes(loc.toLowerCase()))errs.push("location: '"+loc+"' not in list");
        if(!V.status(st))errs.push("status: must be one of "+Object.keys(STATUS_CFG).join("|"));
        if(!V.date(nm2))errs.push("next_maintenance: YYYY-MM-DD required");
        if(!V.calStatus(cs))errs.push("calibration_status: must be cal_required or cal_not_required");
        if(cs==="cal_required"&&!V.date(nc))errs.push("next_calibration: YYYY-MM-DD required when cal_required");
        if(lc&&!V.date(lc))errs.push("last_calibration: YYYY-MM-DD or blank");
        if(errs.length){errors.push({row:rn,msg:errs.join(" · ")});}
        else valid.push({id:uid(),name:nm,category:cat,serial_number:ser,location:loc,status:st,next_maintenance:nm2,calibration_status:cs,last_calibration:lc||null,next_calibration:cs==="cal_required"?(nc||null):null,notes,last_updated:today()});
      });
      STATE.bulkResult={valid,errors};render();
    }catch(err){showToast("Failed to parse: "+err.message,"error");}
  };
  reader.readAsArrayBuffer(file);
}

async function confirmBulk(){
  if(!STATE.bulkResult?.valid?.length)return;
  const btn=document.getElementById("btn-confirm-bulk");
  if(btn){btn.disabled=true;btn.textContent="Importing…";}
  try{
    const {inserted,skipped}=await bulkPersist(STATE.bulkResult.valid);
    STATE.bulkResult=null;STATE.modal=null;
    await fetchEquipment();
    showToast("Imported "+inserted+" items"+(skipped?" · "+skipped+" skipped":""),"success");
  }catch{if(btn){btn.disabled=false;btn.textContent="Import "+STATE.bulkResult.valid.length+" Items";}}
}

/* ─── NAVIGATION ─────────────────────────────────── */
function renderNav(){
  const tabs=[{id:"home",ico:"🏠",lbl:"Home"},{id:"equipment",ico:"📋",lbl:"Equipment"},{id:"maintenance",ico:"🔧",lbl:"Maint."},{id:"reports",ico:"📊",lbl:"Reports"},{id:"settings",ico:"⚙️",lbl:"Settings"}];
  return '<nav class="bnav">'+tabs.map(t=>'<button class="nbtn '+(STATE.tab===t.id?"active":"")+'" data-nav="'+esc(t.id)+'" aria-label="'+esc(t.lbl)+'"><span class="ico">'+t.ico+'</span><span class="lbl">'+esc(t.lbl)+'</span></button>').join("")+'</nav>';
}

/* ─── HOME ───────────────────────────────────────── */
function renderHome(){
  const s=getStats();
  const tiles=[
    {ico:"📊",n:s.total,       lbl:"Total Equipment",  bar:"#3b82f6",nav:"equipment"},
    {ico:"✅",n:s.functional,  lbl:"Functional",        bar:"#22c55e",nav:"equipment"},
    {ico:"⚠️",n:s.overdue,    lbl:"Maint. Overdue",   bar:"#ef4444",nav:"maintenance"},
    {ico:"⏰",n:s.calOverdue,  lbl:"Cal. Overdue",     bar:"#b45309",nav:"maintenance"},
  ];
  const recent=[...STATE.equipment].sort((a,b)=>new Date(b.last_updated)-new Date(a.last_updated)).slice(0,3);
  return '<div class="screen">'+
    '<div class="page-hero"><h1>🏥 '+esc(STATE.settings.hospitalName)+'</h1><p>Medical Equipment Management</p>'+(STATE.offline?'<div style="margin-top:8px;background:rgba(255,255,255,.2);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;display:inline-block">⚠️ Demo Mode</div>':'')+'</div>'+
    '<div style="padding:16px;display:flex;flex-direction:column;gap:16px">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+tiles.map(t=>'<div class="tile" data-nav="'+esc(t.nav)+'"><div style="font-size:26px;margin-bottom:8px">'+t.ico+'</div><div style="font-size:32px;font-weight:900;color:var(--text);line-height:1">'+t.n+'</div><div style="font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--sub);text-transform:uppercase;margin-top:6px">'+esc(t.lbl)+'</div><div class="tile-bar" style="background:'+t.bar+'"></div></div>').join("")+'</div>'+
    '<div><p class="sec-lbl" style="margin-bottom:10px">Quick Actions</p>'+
    '<div style="display:flex;flex-direction:column;gap:8px">'+
    '<button class="btn btn-teal" data-nav="equipment" style="justify-content:flex-start">📋 View All Equipment</button>'+
    '<button class="btn btn-outline" data-nav="maintenance" style="justify-content:flex-start">🔧 Maintenance Tracker</button>'+
    '<button class="btn btn-outline" data-nav="reports" style="justify-content:flex-start">📊 Reports & Analytics</button>'+
    '</div></div>'+
    '<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><p class="sec-lbl">Recent Updates</p><button class="lnk" data-nav="equipment">See All →</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+recent.map(eqCardHTML).join("")+'</div></div></div>'+
    '<style>.lnk{background:none;border:none;color:var(--teal);font-weight:700;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif}</style></div>';
}

/* ─── EQUIPMENT CARD ─────────────────────────────── */
function eqCardHTML(e){
  const diff=daysDiff(e.next_maintenance);
  const sc=STATUS_CFG[e.status]||{label:e.status,bg:"#94a3b8",text:"#fff",icon:"?"};
  const maintPill=diff<0
    ?'<span style="font-size:11px;font-weight:700;color:var(--red);background:var(--red-lt);padding:3px 8px;border-radius:99px;white-space:nowrap">⚠️ '+Math.abs(diff)+'d OD</span>'
    :diff<=30
      ?'<span style="font-size:11px;font-weight:700;color:var(--amber);background:var(--amber-lt);padding:3px 8px;border-radius:99px;white-space:nowrap">🕐 '+diff+'d left</span>'
      :'<span style="font-size:11px;color:var(--sub);white-space:nowrap">'+fmtDate(e.next_maintenance)+'</span>';
  return '<div class="eq-card" data-eq-id="'+esc(e.id)+'" style="border-left-color:'+sc.bg+'">'+
    '<div style="font-weight:800;font-size:15px;color:var(--text);line-height:1.3;margin-bottom:10px">'+esc(e.name)+'</div>'+
    // ── TWO CLEARLY LABELLED STATUS ROWS ──────────────────────────────────
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'+
      '<div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px">'+
        '<span class="status-label">⚙️ Functional Status</span>'+
        funcBadge(e.status)+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px">'+
        '<span class="status-label">⏰ Calibration Status</span>'+
        calBadge(e)+
      '</div>'+
    '</div>'+
    // ── META ───────────────────────────────────────────────────────────────
    '<div style="font-size:12px;color:var(--sub);margin-bottom:8px">'+esc(e.category)+' · SN: '+esc(e.serial_number)+'</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:13px;color:var(--sub)">📍 '+esc(e.location)+'</span>'+maintPill+
    '</div>'+
    '<div style="margin-top:8px;font-size:11px;color:'+(isAdmin()?"var(--teal)":"var(--sub)")+';font-weight:600">'+
      (isAdmin()?"✏️ Tap to edit":"Tap to view details →")+
    '</div>'+
  '</div>';
}

/* ─── EQUIPMENT TAB ──────────────────────────────── */
function renderEquipment(){
  const q=STATE.search.trim().toLowerCase();
  const filt=q?STATE.equipment.filter(e=>[e.name,e.category,e.location,e.serial_number].join(" ").toLowerCase().includes(q)):STATE.equipment;
  const display=STATE.showAll?filt:filt.slice(0,6);
  return '<div class="screen">'+
    '<div class="page-hero"><h1>📋 Equipment</h1><p>'+STATE.equipment.length+' items registered</p></div>'+
    '<div style="padding:16px;display:flex;flex-direction:column;gap:14px">'+
    (isAdmin()
      ?'<button class="btn btn-teal" id="btn-add-eq">➕ Add New Equipment</button>'
      :'<div class="ro-notice"><span style="font-size:20px">👁</span><div><div style="font-weight:700;color:var(--text);font-size:13px">Read-Only View</div><div style="font-size:12px;margin-top:1px">Tap any item for details. <button id="btn-admin-login-eq" style="background:none;border:none;color:var(--teal);font-weight:700;cursor:pointer;font-family:Nunito,sans-serif;font-size:12px;padding:0">Admin login</button> to add/edit.</div></div></div>')+
    '<div class="search-wrap"><input class="inp" id="eq-search" type="search" placeholder="Search name, category, location…" value="'+esc(STATE.search)+'" autocomplete="off" maxlength="100"/></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center"><p class="sec-lbl">'+( STATE.showAll?"All":"Recent")+" ("+filt.length+")</p><button class=\"lnk\" id=\"btn-view-all\">"+(STATE.showAll?"Collapse ↑":"View All →")+'</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+
    (display.length?display.map(eqCardHTML).join(""):'<p style="color:var(--sub);text-align:center;padding:28px">No equipment found.</p>')+
    '</div>'+
    (!STATE.showAll&&filt.length>6?'<button class="btn btn-ghost" id="btn-load-all">Load all '+filt.length+' items</button>':'')+
    '</div>'+
    '<style>.lnk{background:none;border:none;color:var(--teal);font-weight:700;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif}</style></div>';
}

/* ─── EQUIPMENT DETAIL (read-only) ──────────────── */
function renderDetail(){
  const e=STATE.detail;if(!e)return"";
  const sc=STATUS_CFG[e.status]||{label:e.status,bg:"#94a3b8",text:"#fff",icon:"?"};
  const diff=daysDiff(e.next_maintenance);
  const maintSt=diff<0?{txt:"Overdue by "+Math.abs(diff)+"d",color:"var(--red)",bg:"var(--red-lt)"}:diff<=30?{txt:"Due in "+diff+"d",color:"var(--amber)",bg:"var(--amber-lt)"}:{txt:"On schedule",color:"var(--green-dk)",bg:"var(--green-lt)"};
  const calRequired=e.calibration_status==="cal_required";
  const calDiff=calRequired&&e.next_calibration?daysDiff(e.next_calibration):null;
  const calSt=calDiff===null?null:calDiff<0?{txt:"Overdue by "+Math.abs(calDiff)+"d",color:"#b45309",bg:"#fef3c7"}:calDiff<=30?{txt:"Due in "+calDiff+"d",color:"#d97706",bg:"#fef3c7"}:{txt:"On schedule",color:"var(--green-dk)",bg:"var(--green-lt)"};

  const infoRows=[
    {ico:"🏷️",bg:"#eff6ff",label:"Category",          value:e.category},
    {ico:"🔢",bg:"#faf5ff",label:"Serial / Asset No.", value:e.serial_number},
    {ico:"📍",bg:"#fff5f5",label:"Location",           value:e.location},
    {ico:"📅",bg:"#fffbeb",label:"Next Maintenance",   value:fmtDate(e.next_maintenance)},
    {ico:"🕐",bg:maintSt.bg,label:"Maintenance Status",value:maintSt.txt,vc:maintSt.color},
    {ico:"⏰",bg:calRequired?"#fef3c7":"#f8fafc",label:"Calibration Status",
      value:calRequired?"Calibration Required":"Calibration Not Required",vc:calRequired?"#b45309":"var(--sub)"},
    ...(calRequired&&e.last_calibration?[{ico:"🔬",bg:"#f0fdf4",label:"Last Calibration",value:fmtDate(e.last_calibration)}]:[]),
    ...(calRequired&&e.next_calibration?[{ico:"📆",bg:calSt?.bg||"#f8fafc",label:"Next Calibration",value:fmtDate(e.next_calibration),vc:calSt?.color}]:[]),
    ...(calSt?[{ico:"📊",bg:calSt.bg,label:"Calibration Alert",value:calSt.txt,vc:calSt.color}]:[]),
    {ico:"📝",bg:"#f8fafc",label:"Notes",value:e.notes||"—"},
    {ico:"🔄",bg:"#f0fdf4",label:"Last Updated",value:fmtDate(e.last_updated)},
  ];

  return '<div class="fullscreen" role="dialog" aria-modal="true">'+
    '<div class="fs-header"><button class="fs-back" id="btn-close-detail">← Back</button><span style="font-weight:800;font-size:16px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.name)+'</span></div>'+
    // Hero with BOTH statuses
    '<div style="background:linear-gradient(135deg,'+sc.bg+' 0%,'+sc.bg+'cc 100%);padding:22px 18px;display:flex;flex-direction:column;gap:12px">'+
      '<div style="display:flex;align-items:center;gap:14px">'+
        '<div style="width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">'+sc.icon+'</div>'+
        '<h2 style="font-size:18px;font-weight:900;color:#fff;line-height:1.2">'+esc(e.name)+'</h2>'+
      '</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
        '<div style="display:flex;flex-direction:column;gap:3px">'+
          '<span style="font-size:9px;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.8px">⚙️ Functional Status</span>'+
          '<span class="badge" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35)">'+sc.icon+' '+esc(sc.label)+'</span>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:3px">'+
          '<span style="font-size:9px;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.8px">⏰ Calibration Status</span>'+
          (calRequired
            ?(calSt&&calSt.txt.includes("Overdue")?'<span class="badge" style="background:#b45309;color:#fff">⏰ '+esc(calSt.txt)+'</span>'
              :calSt&&calSt.txt.includes("Due in")?'<span class="badge" style="background:#d97706;color:#fff">🔧 '+esc(calSt.txt)+'</span>'
              :'<span class="badge" style="background:rgba(245,158,11,.85);color:#fff">🔧 Cal Required</span>')
            :'<span class="badge" style="background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)">— Not Required</span>')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div style="padding:16px;display:flex;flex-direction:column;gap:16px">'+
      '<div class="card" style="padding:16px">'+
        infoRows.map(r=>'<div class="info-row"><div class="info-icon" style="background:'+r.bg+'">'+r.ico+'</div><div style="flex:1;min-width:0"><div style="font-size:10px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px">'+esc(r.label)+'</div><div style="font-size:14px;font-weight:700;color:'+(r.vc||"var(--text)")+'">'+esc(String(r.value))+'</div></div></div>').join("")+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px">'+
        (isAdmin()
          ?'<button class="btn btn-teal" id="btn-detail-edit">✏️ Edit Equipment</button><button class="btn btn-outline" id="btn-detail-delete" style="color:var(--red);border-color:var(--red)">🗑 Delete Equipment</button>'
          :'<div class="ro-notice"><span>🔐</span><span>Login as admin to edit this equipment.</span></div>')+
        '<button class="btn btn-outline" id="btn-close-detail-2">Close</button>'+
      '</div>'+
    '</div></div>';
}

/* ─── MAINTENANCE TAB ────────────────────────────── */
function renderMaintenance(){
  const s=getStats();const admin=isAdmin();
  function maintCard(e,isOverdue){
    const diff=isOverdue?Math.abs(daysDiff(e.next_maintenance)):daysDiff(e.next_maintenance);
    const sc=STATUS_CFG[e.status]||{label:e.status,bg:"#94a3b8",text:"#fff",icon:"?"};
    const cls=isOverdue?"mcard-red":"mcard-amb";
    const pill=isOverdue
      ?'<span style="font-size:11px;font-weight:800;color:var(--red);background:var(--red-lt);padding:3px 8px;border-radius:99px">⚠️ '+diff+'d overdue</span>'
      :'<span style="font-size:11px;font-weight:800;color:var(--amber);background:var(--amber-lt);padding:3px 8px;border-radius:99px">🕐 '+diff+'d left</span>';
    const btnColor=isOverdue?"btn-red":"btn-amber";
    return '<div class="'+cls+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px"><span style="font-weight:800;color:var(--text);font-size:15px">'+esc(e.name)+'</span>'+pill+'</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
        '<div style="display:flex;flex-direction:column;gap:2px">'+
          '<span class="status-label">⚙️ Functional</span>'+
          '<span class="badge" style="background:'+sc.bg+';color:'+sc.text+';font-size:10px">'+sc.icon+' '+esc(sc.label)+'</span>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:2px">'+
          '<span class="status-label">⏰ Calibration</span>'+
          calBadge(e)+
        '</div>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--sub);margin-bottom:8px">📍 '+esc(e.location)+' · '+(isOverdue?"Was: ":"Due: ")+fmtDate(e.next_maintenance)+'</div>'+
      (admin
        ?'<button class="btn '+btnColor+' btn-mark-done" data-id="'+esc(e.id)+'" style="font-size:13px;padding:10px">✓ Mark Maintenance Done (+90 days)</button>'
        :'<div class="ro-notice">🔒 Admin required to update</div>')+
    '</div>';
  }
  function calCard(e,isOverdue){
    const diff=isOverdue?Math.abs(daysDiff(e.next_calibration)):daysDiff(e.next_calibration);
    const sc=STATUS_CFG[e.status]||{label:e.status,bg:"#94a3b8",text:"#fff",icon:"?"};
    const cls=isOverdue?"mcard-red":"mcard-amb";
    const pill=isOverdue
      ?'<span style="font-size:11px;font-weight:800;color:#b45309;background:#fef3c7;padding:3px 8px;border-radius:99px">⏰ '+diff+'d overdue</span>'
      :'<span style="font-size:11px;font-weight:800;color:#d97706;background:#fef3c7;padding:3px 8px;border-radius:99px">🔧 '+diff+'d left</span>';
    return '<div class="'+cls+'" style="border-color:'+(isOverdue?"#b45309":"#d97706")+';background:'+(isOverdue?"#fefce8":"#fffbeb")+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px"><span style="font-weight:800;color:var(--text);font-size:15px">'+esc(e.name)+'</span>'+pill+'</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
        '<div style="display:flex;flex-direction:column;gap:2px">'+
          '<span class="status-label">⚙️ Functional</span>'+
          '<span class="badge" style="background:'+sc.bg+';color:'+sc.text+';font-size:10px">'+sc.icon+' '+esc(sc.label)+'</span>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:2px">'+
          '<span class="status-label">⏰ Calibration</span>'+
          calBadge(e)+
        '</div>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--sub);margin-bottom:8px">📍 '+esc(e.location)+' · Last cal: '+fmtDate(e.last_calibration)+' · Due: '+fmtDate(e.next_calibration)+'</div>'+
      (admin
        ?'<button class="btn btn-mark-cal-done" data-id="'+esc(e.id)+'" style="font-size:13px;padding:10px;background:'+(isOverdue?"#b45309":"#d97706")+';color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:6px">⏰ Mark Calibration Done (+1 year)</button>'
        :'<div class="ro-notice">🔒 Admin required to update</div>')+
    '</div>';
  }

  const overdueHTML=s.overdueList.length?s.overdueList.map(e=>maintCard(e,true)).join(""):'<div class="mcard-grn">🎉 No maintenance overdue!</div>';
  const upcomingHTML=s.upcoming.length?s.upcoming.map(e=>maintCard(e,false)).join(""):'<p style="color:var(--sub);font-size:14px;padding:6px 0">No maintenance due in 30 days.</p>';
  const calOverdueHTML=s.calOverdueList.length?s.calOverdueList.map(e=>calCard(e,true)).join(""):'<div class="mcard-grn">✅ No calibration overdue!</div>';
  const calUpcomingHTML=s.calUpcomingList.length?s.calUpcomingList.map(e=>calCard(e,false)).join(""):'<p style="color:var(--sub);font-size:14px;padding:6px 0">No calibrations due in 30 days.</p>';

  return '<div class="screen">'+
    '<div class="page-hero"><h1>🔧 Maintenance & Calibration</h1><p>'+s.overdueList.length+' maint. overdue · '+s.calOverdueList.length+' cal. overdue</p></div>'+
    '<div style="padding:16px;display:flex;flex-direction:column;gap:14px">'+
    (!admin?'<div class="ro-notice" style="border-color:var(--teal-mid)"><span style="font-size:18px">🔐</span><div><div style="font-weight:700;color:var(--text);font-size:13px">Read-Only</div><div style="font-size:12px">Login as admin to mark done.</div></div></div>':"")+
    '<div class="card" style="padding:16px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:32px;height:32px;border-radius:10px;background:var(--red-lt);display:flex;align-items:center;justify-content:center;font-size:16px">🔧</div><p style="font-size:14px;font-weight:900;color:var(--text)">Maintenance</p></div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div><p class="sec-lbl" style="color:var(--red)">Overdue ('+s.overdueList.length+')</p></div>'+
      '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">'+overdueHTML+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></div><p class="sec-lbl" style="color:var(--amber)">Upcoming 30d ('+s.upcoming.length+')</p></div>'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+upcomingHTML+'</div>'+
    '</div>'+
    '<div class="card" style="padding:16px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:32px;height:32px;border-radius:10px;background:#fef3c7;display:flex;align-items:center;justify-content:center;font-size:16px">⏰</div><p style="font-size:14px;font-weight:900;color:var(--text)">Calibration</p></div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:#b45309"></div><p class="sec-lbl" style="color:#b45309">Overdue ('+s.calOverdueList.length+')</p></div>'+
      '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">'+calOverdueHTML+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:#d97706"></div><p class="sec-lbl" style="color:#d97706">Upcoming 30d ('+s.calUpcomingList.length+')</p></div>'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+calUpcomingHTML+'</div>'+
    '</div>'+
    '</div></div>';
}

/* ─── REPORTS TAB ────────────────────────────────── */
function renderReports(){
  const s=getStats();
  const types=[
    {id:"status",   ico:"📊",title:"Equipment Status",     desc:"Functional & calibration breakdown", accent:"var(--blue)"},
    {id:"maintenance",ico:"🔧",title:"Maintenance Schedule",desc:"Overdue and upcoming maintenance",   accent:"var(--red)"},
    {id:"location", ico:"📍",title:"By Location",           desc:"Distribution across locations",      accent:"var(--teal)"},
    {id:"category", ico:"🏷️",title:"By Equipment Type",     desc:"Distribution by category",           accent:"var(--amber)"},
  ];
  return '<div class="screen">'+
    '<div class="page-hero"><h1>📊 Reports</h1><p>Analytics and inventory reports</p></div>'+

/* ─── CHART ──────────────────────────────────────── */
function renderChart(){
  const canvas=document.getElementById("report-chart");if(!canvas)return;
  const legEl=document.getElementById("chart-legend");
  if(typeof Chart==="undefined"){if(legEl)legEl.innerHTML='<p style="text-align:center;color:var(--sub);font-size:13px">⚠️ Chart library not loaded. Check your connection.</p>';return;}
  if(STATE.chartInst){STATE.chartInst.destroy();STATE.chartInst=null;}
  const eq=STATE.equipment,total=eq.length||1;
  let labels=[],data=[],colors=[];
  const isMaint=STATE.report==="maintenance";
  if(STATE.report==="status"){
    const c={};eq.forEach(e=>{c[e.status]=(c[e.status]||0)+1;});
    Object.entries(c).forEach(([k,v],i)=>{labels.push(STATUS_CFG[k]?.label||k);data.push(v);colors.push(STATUS_CFG[k]?.bg||CHART_PAL[i%CHART_PAL.length]);});
  }else if(STATE.report==="location"){
    const c={};eq.forEach(e=>{c[e.location]=(c[e.location]||0)+1;});
    Object.entries(c).sort((a,b)=>b[1]-a[1]).forEach(([k,v],i)=>{labels.push(k);data.push(v);colors.push(CHART_PAL[i%CHART_PAL.length]);});
  }else if(STATE.report==="category"){
    const c={};eq.forEach(e=>{c[e.category]=(c[e.category]||0)+1;});
    Object.entries(c).sort((a,b)=>b[1]-a[1]).forEach(([k,v],i)=>{labels.push(k);data.push(v);colors.push(CHART_PAL[i%CHART_PAL.length]);});
  }else{
    const ov=eq.filter(e=>daysDiff(e.next_maintenance)<0).length,up=eq.filter(e=>{const d=daysDiff(e.next_maintenance);return d>=0&&d<=30;}).length,ok=eq.length-ov-up;
    labels=["Overdue","Upcoming 30d","On Schedule"];data=[ov,up,ok];colors=["#ef4444","#f59e0b","#22c55e"];
  }
  const pct=v=>((v/total)*100).toFixed(1)+"%";
  STATE.chartInst=new Chart(canvas,{
    type:isMaint?"bar":"doughnut",
    data:{labels,datasets:[{data,backgroundColor:isMaint?colors.map(c=>c+"cc"):colors,borderColor:"#fff",borderWidth:isMaint?0:3,hoverOffset:isMaint?0:10,borderRadius:isMaint?8:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:isMaint?undefined:"58%",
      plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(15,23,42,.9)",titleFont:{family:"Nunito",size:13,weight:"800"},bodyFont:{family:"Nunito",size:12},padding:12,cornerRadius:10,
        callbacks:{label:ctx=>" "+(isMaint?ctx.raw:ctx.parsed)+" item"+((isMaint?ctx.raw:ctx.parsed)!==1?"s":"")+" — "+pct(isMaint?ctx.raw:ctx.parsed)}}},
      scales:isMaint?{y:{beginAtZero:true,ticks:{font:{family:"Nunito",size:11},stepSize:1},grid:{color:"rgba(0,0,0,.05)"}},x:{ticks:{font:{family:"Nunito",size:11}},grid:{display:false}}}:undefined},
  });
  if(legEl){
    legEl.innerHTML='<div style="display:flex;justify-content:space-between;padding:0 10px 6px;border-bottom:1px solid var(--border);margin-bottom:4px"><span style="font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase">Category</span><div style="display:flex;gap:16px"><span style="font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase">Count</span><span style="font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase">Share</span></div></div>'+
    labels.map((lbl,i)=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:'+(i%2===0?"#f8fafc":"#fff")+'"><div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0"><div style="width:12px;height:12px;border-radius:3px;background:'+colors[i]+';flex-shrink:0"></div><span style="font-size:12.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(lbl)+'</span></div><div style="display:flex;align-items:center;gap:10px;flex-shrink:0"><span style="font-size:14px;font-weight:900;color:var(--text)">'+data[i]+'</span><span style="font-size:11px;font-weight:700;color:'+colors[i]+';background:'+colors[i]+'1a;padding:3px 8px;border-radius:99px">'+pct(data[i])+'</span></div></div>').join("");
  }
}

}

  if(errEl)errEl.style.display="none";
  const btn=document.getElementById("btn-do-login");
  if(btn){btn.disabled=true;btn.textContent="Verifying…";}
  const res=await doLogin(email,pass);
  if(res.ok){STATE.modal=null;render();showToast("Welcome, "+esc(STATE.adminEmail)+" ✓","success");}
  else{if(errEl){errEl.textContent=res.msg;errEl.style.display="block";}if(btn){btn.disabled=false;btn.textContent="Login";}}
}

async function handleSaveEq(){
  if(!isAdmin())return;
  function showFE(id,msg){const el=document.getElementById(id);if(el)el.classList.add("err");const e=document.getElementById("err-"+id);if(e){e.textContent=msg;e.style.display="block";}}
  function clearFE(){document.querySelectorAll(".inp.err").forEach(el=>el.classList.remove("err"));document.querySelectorAll(".field-err").forEach(el=>{el.style.display="none";el.textContent="";});}
  clearFE();
  const name   =san.name(document.getElementById("inp-name")?.value||"");
  const serial =san.serial(document.getElementById("inp-serial")?.value||"");
  const maint  =san.date(document.getElementById("inp-maint")?.value||"");
  const rawCat =san.text(document.getElementById("inp-category")?.value||"");
  const rawLoc =san.text(document.getElementById("inp-location")?.value||"");
  const rawStat=san.text(document.getElementById("inp-status")?.value||"");
  const calStatVal=san.text(document.getElementById("inp-cal-status")?.value||"cal_not_required");
  const lastCal=san.date(document.getElementById("inp-last-cal")?.value||"")||null;
  const nextCal=san.date(document.getElementById("inp-next-cal")?.value||"")||null;
  const notes  =san.notes(document.getElementById("inp-notes")?.value||"");
  let ok=true;
  if(!V.name(name))                  {showFE("inp-name","Name must be 2–120 characters.");ok=false;}
  if(!V.serial(serial))              {showFE("inp-serial","Use 1–60 alphanumeric / - _ . / chars.");ok=false;}
  if(!V.date(maint))                 {showFE("inp-maint","Select a valid date (YYYY-MM-DD).");ok=false;}
  if(!V.status(rawStat))             {showFE("inp-status","Invalid functional status.");ok=false;}
  if(!V.calStatus(calStatVal))       {showFE("inp-cal-status","Invalid calibration status.");ok=false;}
  if(!getCategories().includes(rawCat)){showFE("inp-category","Select a valid category.");ok=false;}
  if(!getLocations().includes(rawLoc)) {showFE("inp-location","Select a valid location.");ok=false;}
  if(calStatVal==="cal_required"){
    if(lastCal&&!V.date(lastCal))    {showFE("inp-last-cal","Enter a valid date (YYYY-MM-DD).");ok=false;}
    if(!nextCal)                     {showFE("inp-next-cal","Next Calibration Date is required.");ok=false;}
    else if(!V.date(nextCal))        {showFE("inp-next-cal","Enter a valid date (YYYY-MM-DD).");ok=false;}
  }
  if(!ok)return;
  const isEdit=STATE.modal&&STATE.modal!=="add";
  const item={id:isEdit?STATE.modal.id:uid(),name,category:rawCat,serial_number:serial,location:rawLoc,status:rawStat,next_maintenance:maint,calibration_status:calStatVal,last_calibration:calStatVal==="cal_required"?lastCal:null,next_calibration:calStatVal==="cal_required"?nextCal:null,notes,last_updated:today(),...(isEdit?{}:{_isNew:true})};
  const btn=document.getElementById("btn-save-eq");
  if(btn){btn.disabled=true;btn.textContent="Saving…";}
  try{await persistEquipment(item);STATE.modal=null;await fetchEquipment();showToast(isEdit?"Equipment updated ✓":"Equipment added ✓","success");}
  catch{if(btn){btn.disabled=false;btn.textContent="💾 "+(isEdit?"Update":"Add")+" Equipment";}}
}

async function handleDeleteEq(){
  if(!isAdmin()||STATE.modal==="add"||!STATE.modal)return;
  if(!confirm("Delete \""+san.text(STATE.modal.name)+"\"? This cannot be undone."))return;
  try{await removeEquipment(STATE.modal.id);STATE.modal=null;render();showToast("Equipment deleted","info");}catch{}
}

/* ═══════════════════════════════════════════════════════
   15. TOAST
═══════════════════════════════════════════════════════ */
function showToast(msg,type){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const BG={success:"#dcfce7",error:"#fee2e2",info:"#1e293b"};
  const TC={success:"#166534",error:"#991b1b",info:"#fff"};
  const t=document.createElement("div");
  t.className="toast";t.setAttribute("role","status");t.setAttribute("aria-live","polite");
  t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:"+(BG[type]||BG.info)+";color:"+(TC[type]||TC.info)+";font-family:Nunito,sans-serif;font-weight:700;font-size:13px;padding:11px 22px;border-radius:99px;z-index:999;max-width:320px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.18);pointer-events:none;border:"+(type!=="info"?"1.5px solid "+(TC[type]||""):"none")+";animation:fadeIn .2s ease";
  t.textContent=String(msg||"").slice(0,200);
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300);},2800);
}

/* ═══════════════════════════════════════════════════════
   16. BOOT
═══════════════════════════════════════════════════════ */
if(SUPABASE_URL.includes("YOUR_PROJECT")||SUPABASE_ANON.includes("YOUR_ANON")){
  STATE.offline=true;STATE.loading=false;
  STATE.equipment=JSON.parse(JSON.stringify(SEED));
  render();
}else{
  render();
  // Load settings from Supabase first so hospital name is correct on all devices,
  // then load equipment and start polling.
  loadSettingsFromDB().then(()=>{
    render(); // re-render with synced settings
    fetchEquipment().then(()=>startPolling());
  });
}

// Auto-logout on JWT expiry
setInterval(()=>{
  if(STATE.adminSession?.expires_at&&Date.now()/1000>STATE.adminSession.expires_at-60){
    doLogout();showToast("Session expired — please log in again.","error");render();
  }
},60000);
</script>
